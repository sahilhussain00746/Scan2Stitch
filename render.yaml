services:
  - type: web
    name: scan2stitch
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true        # Render automatically generate karega
      - key: DATABASE_URL
        fromDatabase:
          name: scan2stitch-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.9"

databases:
  - name: scan2stitch-db
    plan: free                     # Render ka free PostgreSQL (90 din)
